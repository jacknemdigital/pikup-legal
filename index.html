<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pikup – Legal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #fff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
    .tagline { color: #666; margin-bottom: 40px; font-size: 15px; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    a.btn {
      display: block;
      padding: 16px;
      background: #f5f5f5;
      border-radius: 12px;
      text-decoration: none;
      color: #1a1a1a;
      font-weight: 500;
      font-size: 15px;
      transition: background 0.15s;
    }
    a.btn:hover { background: #ebebeb; }
    .footer { margin-top: 40px; color: #bbb; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Pikup</div>
    <p class="tagline">Find people to play with.</p>
    <div class="links">
      <a href="privacy.html" class="btn">Privacy Policy</a>
      <a href="terms.html" class="btn">Terms of Service</a>
    </div>
    <p class="footer">© 2026 Pikup</p>
  </div>
</body>
</html>
